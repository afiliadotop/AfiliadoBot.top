name: 🛍️ Shopee 6.6 Mid-Year Sale Campaign

on:
  schedule:
    # Todos os horários em UTC (BRT = UTC-3)
    - cron: '0 10 6 6 *'   # 07h BRT — Abertura: Presente Namorada
    - cron: '0 13 6 6 *'   # 10h BRT — Moda Feminina
    - cron: '0 15 6 6 *'   # 12h BRT — Bijuterias
    - cron: '0 19 6 6 *'   # 16h BRT — Beleza & Skincare
    - cron: '0 23 6 6 *'   # 20h BRT — Prime Time Namorados
  workflow_dispatch:
    inputs:
      slot:
        description: 'Slot a executar (morning/late_morning/noon/afternoon/evening)'
        required: false
        default: ''

jobs:
  send-66-promo:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run 6.6 Campaign
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          SHOPEE_APP_ID: ${{ secrets.SHOPEE_APP_ID }}
          SHOPEE_APP_SECRET: ${{ secrets.SHOPEE_APP_SECRET }}
          # Topic IDs — configure no Render e copie aqui como secrets
          TOPIC_ROUPAS: ${{ secrets.TOPIC_ROUPAS }}
          TOPIC_BIJUTERIAS: ${{ secrets.TOPIC_BIJUTERIAS }}
          TOPIC_BELEZA: ${{ secrets.TOPIC_BELEZA }}
          TOPIC_CUPONS: ${{ secrets.TOPIC_CUPONS }}
          TOPIC_VIDEOS: ${{ secrets.TOPIC_VIDEOS }}
          TOPIC_NAMORADOS: ${{ secrets.TOPIC_NAMORADOS }}
          TOPIC_GERAL: ${{ secrets.TOPIC_GERAL }}
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd):$(pwd)/afiliadohub
          python scripts/production/send_66_campaign.py "${{ github.event.inputs.slot }}"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: 66-campaign-logs
          path: '*.log'
          retention-days: 3
          if-no-files-found: warn
